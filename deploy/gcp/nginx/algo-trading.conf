# TLS + WebSocket reverse proxy in front of the engine container.
# Install on the VM: copy to /etc/nginx/sites-available/ and symlink sites-enabled.
# Replace YOUR_DOMAIN and certificate paths (certbot or Google-managed cert on LB).

upstream algo_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Restrict to operator networks when not using Cloud IAP
    # allow 203.0.113.0/24;
    # deny all;

    client_max_body_size 4m;

    location / {
        proxy_pass http://algo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://algo_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
