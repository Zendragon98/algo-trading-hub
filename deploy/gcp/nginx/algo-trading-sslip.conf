# TLS reverse proxy for IP-based hostname (sslip.io) when no custom domain yet.
# Replace SERVER_NAME with: 35-254-130-75.sslip.io (dashes for dots in VM external IP)

upstream algo_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name 35-254-130-75.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name 35-254-130-75.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/35-254-130-75.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/35-254-130-75.sslip.io/privkey.pem;

    client_max_body_size 4m;

    location / {
        proxy_pass http://algo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://algo_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
