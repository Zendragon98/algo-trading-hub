<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Algo Trading Hub — Architecture Map</title>
<style>
  :root{
    --bg:#0b1020; --bg2:#0f1629; --panel:#111a30; --line:#1e293b;
    --ink:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:13px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  #app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{display:flex;align-items:center;gap:14px;padding:8px 14px;
    background:linear-gradient(180deg,#0f1629,#0b1020);border-bottom:1px solid var(--line);
    flex-wrap:wrap;z-index:30}
  header h1{font-size:15px;margin:0;font-weight:650;letter-spacing:.2px}
  header h1 small{color:var(--muted);font-weight:400;margin-left:6px}
  .stats{display:flex;gap:10px;color:var(--muted)}
  .stats b{color:var(--ink)}
  .spacer{flex:1}
  .ctrls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .toggle{display:flex;align-items:center;gap:5px;padding:4px 9px;border:1px solid var(--line);
    border-radius:7px;background:#0d1426;cursor:pointer;user-select:none;color:var(--muted)}
  .toggle.on{color:var(--ink);border-color:var(--accent);box-shadow:inset 0 0 0 1px rgba(56,189,248,.25)}
  .toggle input{display:none}
  button.btn{padding:4px 10px;border:1px solid var(--line);border-radius:7px;background:#0d1426;
    color:var(--muted);cursor:pointer}
  button.btn:hover{color:var(--ink);border-color:var(--accent)}
  .searchwrap{position:relative}
  #search{width:240px;padding:5px 9px;border:1px solid var(--line);border-radius:7px;
    background:#0d1426;color:var(--ink);outline:none}
  #search:focus{border-color:var(--accent)}
  #results{position:absolute;top:34px;left:0;width:340px;max-height:50vh;overflow:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:8px;display:none;z-index:60;
    box-shadow:0 18px 40px rgba(0,0,0,.5)}
  #results.show{display:block}
  .res{display:flex;gap:8px;align-items:center;padding:6px 10px;cursor:pointer;border-bottom:1px solid #16223c}
  .res:hover{background:#16223c}
  .res .kind{font-size:10px;text-transform:uppercase;color:#0b1020;border-radius:4px;padding:1px 5px;font-weight:700}
  .res .t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .res .mod{color:var(--muted);font-size:11px}
  main{flex:1;display:flex;min-height:0}
  #stage{flex:1;position:relative;overflow:hidden;cursor:grab;
    background:
      radial-gradient(circle at 20% 10%,rgba(56,189,248,.06),transparent 40%),
      radial-gradient(circle at 85% 80%,rgba(244,63,94,.05),transparent 40%),
      var(--bg)}
  #stage.grabbing{cursor:grabbing}
  #canvas{position:relative;transform-origin:0 0;will-change:transform;
    display:flex;flex-wrap:wrap;align-content:flex-start;gap:26px;padding:40px;width:2700px}
  #edges{position:absolute;left:0;top:0;pointer-events:none;overflow:visible;z-index:1}
  .cluster{position:relative;z-index:2;background:rgba(15,22,41,.72);border:1px solid var(--line);
    border-top:3px solid var(--clr);border-radius:12px;padding:8px 10px 10px;
    backdrop-filter:blur(2px);max-width:560px}
  .cluster h3{margin:0 0 7px;font-size:12px;letter-spacing:.3px;display:flex;align-items:center;gap:7px}
  .cluster h3 .dot{width:9px;height:9px;border-radius:50%;background:var(--clr)}
  .cluster h3 .n{color:var(--muted);font-weight:400;font-size:11px}
  .cbody{display:flex;flex-wrap:wrap;gap:6px;max-width:540px}
  .chip{position:relative;display:flex;flex-direction:column;gap:1px;padding:5px 8px;border-radius:8px;
    border:1px solid #243049;cursor:pointer;min-width:96px;max-width:200px;
    background:#0c1322;transition:transform .08s,box-shadow .08s,border-color .08s}
  .chip:hover{transform:translateY(-1px)}
  .chip .nm{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip .meta{font-size:10px;color:var(--muted);display:flex;gap:6px}
  .chip .meta i{font-style:normal}
  .chip.dim{opacity:.18;filter:grayscale(.4)}
  .chip.hl{border-color:var(--clr);box-shadow:0 0 0 1px var(--clr),0 6px 18px rgba(0,0,0,.45)}
  .chip.sel{border-color:#fff;box-shadow:0 0 0 2px var(--clr),0 8px 22px rgba(0,0,0,.55)}
  .chip.match{outline:2px solid #facc15;outline-offset:1px}
  /* side panel */
  #panel{width:360px;flex:0 0 360px;background:var(--panel);border-left:1px solid var(--line);
    overflow:auto;padding:0;display:flex;flex-direction:column}
  #panel .ph{padding:12px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;
    background:var(--panel);z-index:2}
  #panel .ph .lay{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--clr,#94a3b8);font-weight:700}
  #panel .ph .ttl{font-size:15px;font-weight:650;margin-top:2px;word-break:break-all}
  #panel .ph .rel{color:var(--muted);font-size:11px;margin-top:3px;word-break:break-all}
  #panel .body{padding:10px 14px 40px}
  .sec{margin:12px 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
    display:flex;justify-content:space-between}
  .kls{border:1px solid var(--line);border-radius:8px;margin:6px 0;overflow:hidden}
  .kls>summary{cursor:pointer;padding:6px 9px;font-weight:600;background:#0d1628;list-style:none;
    display:flex;justify-content:space-between;align-items:center}
  .kls>summary::-webkit-details-marker{display:none}
  .kls>summary .b{color:var(--muted);font-size:10px;font-weight:400}
  .kls .ms{padding:6px 9px;display:flex;flex-wrap:wrap;gap:5px}
  .m{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:#0b1322;border:1px solid #1d2840;
    border-radius:5px;padding:2px 6px;color:#cbd5e1}
  .lnk{display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:6px;cursor:pointer}
  .lnk:hover{background:#16223c}
  .lnk .ld{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .lnk .lt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
  .lnk .ll{color:var(--muted);font-size:10px}
  .empty{color:var(--muted);font-style:italic;padding:8px 0}
  .hint{position:absolute;left:14px;bottom:12px;color:var(--muted);font-size:11px;z-index:5;
    background:rgba(11,16,32,.7);padding:6px 10px;border-radius:8px;border:1px solid var(--line)}
  .legend{position:absolute;right:14px;bottom:12px;z-index:5;background:rgba(11,16,32,.82);
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;max-width:230px}
  .legend .li{display:flex;align-items:center;gap:7px;cursor:pointer;padding:1px 0;color:var(--muted)}
  .legend .li:hover{color:var(--ink)}
  .legend .li .d{width:9px;height:9px;border-radius:50%}
  .legend .li.off{opacity:.35;text-decoration:line-through}
  svg line.imp{stroke:#334155;stroke-width:1}
  svg path.flow{fill:none;stroke-width:2.2;marker-end:url(#arr)}
  svg text.fl{fill:#cbd5e1;font-size:10px;paint-order:stroke;stroke:#0b1020;stroke-width:3px}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Algo Trading Hub <small>backend architecture map</small></h1>
    <div class="stats" id="stats"></div>
    <div class="spacer"></div>
    <div class="searchwrap">
      <input id="search" placeholder="Search module / class / function…" autocomplete="off"/>
      <div id="results"></div>
    </div>
    <div class="ctrls">
      <label class="toggle on" id="t-flow"><input type="checkbox" checked/>Live pipeline</label>
      <label class="toggle" id="t-imports"><input type="checkbox"/>All imports</label>
      <button class="btn" id="reset">Reset view</button>
    </div>
  </header>
  <main>
    <div id="stage">
      <div id="canvas">
        <svg id="edges" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="#e2e8f0"/>
            </marker>
          </defs>
        </svg>
      </div>
      <div class="hint">drag to pan · scroll to zoom · hover a node to trace links · click to inspect</div>
      <div class="legend" id="legend"></div>
    </div>
    <aside id="panel">
      <div class="ph"><div class="lay">—</div><div class="ttl">Select a node</div>
        <div class="rel">Click any module to see its classes, functions and links.</div></div>
      <div class="body" id="pbody"></div>
    </aside>
  </main>
</div>

    c.addEventListener('mouseenter',()=>hover(n.id));
    c.addEventListener('mouseleave',()=>hover(null));
    c.addEventListener('click',e=>{e.stopPropagation();select(n.id,true);});
    body.appendChild(c); chipEl[n.id]=c;
  });
  cl.appendChild(body); canvas.insertBefore(cl, null);
});

// stats + legend
const s = DATA.stats;
document.getElementById('stats').innerHTML =
  `<span><b>${s.modules}</b> modules</span><span><b>${s.classes}</b> classes</span>`+
  `<span><b>${s.functions}</b> functions</span><span><b>${s.edges}</b> import links</span>`;
const legend = document.getElementById('legend'); const layerOff = {};
DATA.layers.forEach(l=>{ if(!byLayer[l.id]) return;
  const li=document.createElement('div'); li.className='li'; li.dataset.layer=l.id;
  li.innerHTML=`<span class="d" style="background:${l.color}"></span>${l.title}`;
  li.addEventListener('click',()=>{ layerOff[l.id]=!layerOff[l.id];
    li.classList.toggle('off',layerOff[l.id]);
    canvas.querySelectorAll('.chip').forEach(c=>{ if(N[c.dataset.id].layer===l.id)
      c.style.display = layerOff[l.id]?'none':''; });
    requestAnimationFrame(redraw); });
  legend.appendChild(li);
});

// ---- geometry --------------------------------------------------------------
function center(el){ let x=el.offsetLeft+el.offsetWidth/2, y=el.offsetTop+el.offsetHeight/2;
  let p=el.offsetParent;
  while(p && p!==canvas){ x+=p.offsetLeft; y+=p.offsetTop; p=p.offsetParent; }
  return {x,y};
}
function sizeSvg(){ svg.setAttribute('width',canvas.scrollWidth);
  svg.setAttribute('height',canvas.scrollHeight); }

// ---- edge drawing ----------------------------------------------------------
let showFlow=true, showImports=false, hoverId=null, selId=null;
const NS='http://www.w3.org/2000/svg';
function clearEdges(){ [...svg.querySelectorAll('line,path,text')].forEach(e=>e.remove()); }
function line(a,b,cls){ const A=center(chipEl[a]),B=center(chipEl[b]);
  const l=document.createElementNS(NS,'line'); l.setAttribute('x1',A.x);l.setAttribute('y1',A.y);
  l.setAttribute('x2',B.x);l.setAttribute('y2',B.y); l.setAttribute('class',cls); return l; }
function curve(a,b,color){ const A=center(chipEl[a]),B=center(chipEl[b]);
  const mx=(A.x+B.x)/2, my=(A.y+B.y)/2-Math.min(120,Math.abs(B.x-A.x)*0.18+30);
  const p=document.createElementNS(NS,'path');
  p.setAttribute('d',`M${A.x},${A.y} Q${mx},${my} ${B.x},${B.y}`);
  p.setAttribute('class','flow'); p.setAttribute('stroke',color); return {p,mx,my}; }

function redraw(){
  clearEdges();
  const focus = hoverId||selId;
  if(showImports && !focus){
    DATA.edges.forEach(e=>{ if(vis(e.s)&&vis(e.t)){ const l=line(e.s,e.t,'imp');
      l.setAttribute('stroke-opacity','0.16'); svg.appendChild(l);} });
  }
  if(focus && N[focus]){
    (OUT[focus]||[]).forEach(t=>{ if(vis(t)){const l=line(focus,t,'imp');
      l.setAttribute('stroke','#38bdf8');l.setAttribute('stroke-opacity','0.9');svg.appendChild(l);} });
    (INC[focus]||[]).forEach(srcv=>{ if(vis(srcv)){const l=line(srcv,focus,'imp');
      l.setAttribute('stroke','#f59e0b');l.setAttribute('stroke-opacity','0.8');svg.appendChild(l);} });
  }
  if(showFlow){
    DATA.flow.forEach(f=>{ if(!vis(f.s)||!vis(f.t))return;
      const color = LAY[N[f.s].layer]?.color || '#e2e8f0';
      const {p,mx,my}=curve(f.s,f.t,color);
      const fade = focus && f.s!==focus && f.t!==focus;
      p.setAttribute('stroke-opacity', fade?'0.18':'0.95');
      svg.appendChild(p);
      if(!fade){ const tx=document.createElementNS(NS,'text');
        tx.setAttribute('x',mx);tx.setAttribute('y',my-3);tx.setAttribute('text-anchor','middle');
        tx.setAttribute('class','fl');tx.textContent=f.label; svg.appendChild(tx); }
    });
  }
}
function vis(id){ const c=chipEl[id]; return c && c.style.display!=='none'; }

// ---- hover / select highlighting ------------------------------------------
function neighbors(id){ const s=new Set([id]);
  (OUT[id]||[]).forEach(x=>s.add(x)); (INC[id]||[]).forEach(x=>s.add(x));
  DATA.flow.forEach(f=>{ if(f.s===id)s.add(f.t); if(f.t===id)s.add(f.s); }); return s; }
function hover(id){ hoverId=id; paint(); requestAnimationFrame(redraw); }
function paint(){
  const focus=hoverId||selId; const nb = focus?neighbors(focus):null;
  for(const id in chipEl){ const c=chipEl[id];
    c.classList.toggle('hl', !!(nb&&nb.has(id)&&id!==focus));
    c.classList.toggle('sel', id===selId);
    c.classList.toggle('dim', !!(focus&&nb&&!nb.has(id)));
  }
}

// ---- side panel ------------------------------------------------------------
const kindColor={module:'#38bdf8',class:'#a3e635',method:'#fbbf24',function:'#f472b6'};
function select(id, focusView){
  selId=id; paint(); requestAnimationFrame(redraw);
  const n=N[id]; const lay=LAY[n.layer];
  const ph=document.querySelector('#panel .ph');
  ph.style.setProperty('--clr',lay.color);
  ph.querySelector('.lay').textContent=lay.title;
  ph.querySelector('.lay').style.color=lay.color;
  ph.querySelector('.ttl').textContent=n.id;
  ph.querySelector('.rel').textContent=n.rel + (n.note?(' — '+n.note):'');
  const b=document.getElementById('pbody'); b.innerHTML='';
  if(n.classes && n.classes.length){
    b.insertAdjacentHTML('beforeend',`<div class="sec">Classes <span>${n.classes.length}</span></div>`);
    n.classes.forEach(c=>{
      const d=document.createElement('details'); d.className='kls';
      const base=c.bases&&c.bases.length?` : ${c.bases.join(', ')}`:'';
      d.innerHTML=`<summary><span>${c.name}<span class="b">${base}</span></span>`+
        `<span class="b">${c.methods.length} methods</span></summary>`+
        `<div class="ms">${c.methods.map(m=>`<span class="m">${m}()</span>`).join('')||'<span class="empty">no methods</span>'}</div>`;
      b.appendChild(d);
    });
  }
  if(n.functions && n.functions.length){
    b.insertAdjacentHTML('beforeend',`<div class="sec">Functions <span>${n.functions.length}</span></div>`);
    const wrap=document.createElement('div'); wrap.className='ms'; wrap.style.padding='2px 0';
    wrap.innerHTML=n.functions.map(f=>`<span class="m">${f}()</span>`).join('');
    b.appendChild(wrap);
  }
  const deps=(OUT[id]||[]).slice().sort(), dependents=(INC[id]||[]).slice().sort();
  linkSec(b,`Imports → (${deps.length})`,deps,'#38bdf8');
  linkSec(b,`← Imported by (${dependents.length})`,dependents,'#f59e0b');
  const fl=DATA.flow.filter(f=>f.s===id||f.t===id);
  if(fl.length){ b.insertAdjacentHTML('beforeend',`<div class="sec">Live pipeline</div>`);
    fl.forEach(f=>{ const other=f.s===id?f.t:f.s; const dir=f.s===id?'→':'←';
      const row=document.createElement('div'); row.className='lnk';
      row.innerHTML=`<span class="ld" style="background:${LAY[N[other].layer].color}"></span>`+
        `<span class="lt">${dir} ${other}</span><span class="ll">${f.label}</span>`;
      row.onclick=()=>{select(other,true);}; b.appendChild(row); });
  }
  if(focusView) focusNode(id);
}
function linkSec(b,title,ids,color){
  b.insertAdjacentHTML('beforeend',`<div class="sec">${title}</div>`);
  if(!ids.length){ b.insertAdjacentHTML('beforeend',`<div class="empty">none</div>`); return; }
  ids.forEach(t=>{ const n=N[t]; if(!n)return;
    const row=document.createElement('div'); row.className='lnk';
    row.innerHTML=`<span class="ld" style="background:${LAY[n.layer].color}"></span>`+
      `<span class="lt">${t}</span><span class="ll">${LAY[n.layer].title}</span>`;
    row.onclick=()=>select(t,true); b.appendChild(row);
  });
}

// ---- pan / zoom ------------------------------------------------------------
const stage=document.getElementById('stage');
let tx=0,ty=0,scale=1,drag=null;
function apply(){ canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }
stage.addEventListener('wheel',e=>{ e.preventDefault();
  const r=stage.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top;
  const ns=Math.min(2.2,Math.max(0.12, scale*(e.deltaY<0?1.12:0.89)));
  tx=mx-(mx-tx)*(ns/scale); ty=my-(my-ty)*(ns/scale); scale=ns; apply();
},{passive:false});
stage.addEventListener('pointerdown',e=>{ if(e.target.closest('.chip'))return;
  drag={x:e.clientX,y:e.clientY,tx,ty}; stage.classList.add('grabbing'); stage.setPointerCapture(e.pointerId);});
stage.addEventListener('pointermove',e=>{ if(!drag)return; tx=drag.tx+(e.clientX-drag.x); ty=drag.ty+(e.clientY-drag.y); apply();});
stage.addEventListener('pointerup',()=>{drag=null;stage.classList.remove('grabbing');});
stage.addEventListener('click',e=>{ if(!e.target.closest('.chip')&&!e.target.closest('.cluster')){ selId=null; paint(); requestAnimationFrame(redraw);} });
function focusNode(id){ const c=chipEl[id]; if(!c)return; const ctr=center(c);
  const r=stage.getBoundingClientRect(); scale=Math.max(scale,0.7);
  tx=r.width/2 - ctr.x*scale; ty=r.height/2 - ctr.y*scale; apply(); }
function reset(){ const r=stage.getBoundingClientRect();
  scale=Math.min(1,(r.width-40)/canvas.scrollWidth); if(!isFinite(scale)||scale<=0)scale=0.5;
  scale=Math.max(scale,0.18); tx=20;ty=20; apply(); requestAnimationFrame(redraw); }
document.getElementById('reset').onclick=reset;

// ---- toggles ---------------------------------------------------------------
function bindToggle(elId,set){ const el=document.getElementById(elId);
  el.addEventListener('click',()=>{ const cb=el.querySelector('input'); cb.checked=!cb.checked;
    el.classList.toggle('on',cb.checked); set(cb.checked); requestAnimationFrame(redraw); }); }
bindToggle('t-flow',v=>showFlow=v);
bindToggle('t-imports',v=>showImports=v);

// ---- search ----------------------------------------------------------------
const search=document.getElementById('search'), results=document.getElementById('results');
search.addEventListener('input',()=>{ const q=search.value.trim().toLowerCase();
  for(const id in chipEl) chipEl[id].classList.remove('match');
  if(!q){ results.classList.remove('show'); return; }
  const hits=DATA.search.filter(r=>r.t.toLowerCase().includes(q)).slice(0,50);
  const seen=new Set();
  results.innerHTML=hits.map(h=>{
    const mark=`${h.k}:${h.t}:${h.m}`; if(seen.has(mark))return''; seen.add(mark);
    return `<div class="res" data-mod="${h.m}" data-t="${h.t}">`+
      `<span class="kind" style="background:${kindColor[h.k]}">${h.k}</span>`+
      `<span class="t">${h.t}</span><span class="mod">${h.m.split('.').slice(-2).join('.')}</span></div>`;
  }).join('')|| '<div class="res"><span class="t">no matches</span></div>';
  results.classList.add('show');
  results.querySelectorAll('.res[data-mod]').forEach(r=>{
    r.onclick=()=>{ const m=r.dataset.mod; select(m,true);
      chipEl[m]&&chipEl[m].classList.add('match'); results.classList.remove('show'); search.blur(); }; });
  // highlight matching modules on the map
  hits.forEach(h=>{ if(chipEl[h.m]) chipEl[h.m].classList.add('match'); });
});
search.addEventListener('blur',()=>setTimeout(()=>results.classList.remove('show'),180));
document.addEventListener('keydown',e=>{ if(e.key==='/'&&document.activeElement!==search){e.preventDefault();search.focus();}
  if(e.key==='Escape'){selId=null;paint();requestAnimationFrame(redraw);search.value='';results.classList.remove('show');} });

// ---- init ------------------------------------------------------------------
requestAnimationFrame(()=>{ sizeSvg(); reset();
  select('engine.core.engine',false);
  window.addEventListener('resize',()=>{requestAnimationFrame(redraw);});
});
</script>
</body>
</html>
