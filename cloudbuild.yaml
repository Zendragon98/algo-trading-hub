# Google Cloud Build — build and push the backend image to Artifact Registry.
#
# Prerequisites (one-time):
#   gcloud services enable cloudbuild.googleapis.com artifactregistry.googleapis.com
#   gcloud artifacts repositories create algo-trading \
#     --repository-format=docker --location=$REGION
#
# Submit:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPOSITORY=algo-trading

substitutions:
  _REGION: us-central1
  _REPOSITORY: algo-trading
  _IMAGE: backend
  _ZONE: us-central1-a
  _INSTANCE: algo-trading-engine
  _COMPOSE_DIR: /opt/algo-trading-hub/deploy/gcp

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
      - backend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud compute ssh "${_INSTANCE}" \
          --project="$PROJECT_ID" \
          --zone="${_ZONE}" \
          --tunnel-through-iap \
          --quiet \
          --command='set -euo pipefail
        cd ${_COMPOSE_DIR}
        sudo docker compose pull
        sudo docker compose up -d --force-recreate --remove-orphans
        for i in $(seq 1 48); do
          if curl -sf http://127.0.0.1:8000/health; then
            exit 0
          fi
          sleep 5
        done
        echo "health check failed after 240s"
        sudo docker compose ps
        sudo docker compose logs --tail=60
        exit 1'

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
