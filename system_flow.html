<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Algo Trading Hub — System Flow</title>
<style>
  :root{--bg:#0b1020;--panel:#111a30;--line:#1e293b;--ink:#e2e8f0;--muted:#94a3b8;--faint:#2a3a52}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font:13px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  #app{max-width:1480px;margin:0 auto;padding:14px}
  header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  h1{font-size:16px;margin:0;font-weight:650}
  h1 small{color:var(--muted);font-weight:400;margin-left:6px}
  .spacer{flex:1}
  .seg{display:flex;gap:5px;background:#0d1426;border:1px solid var(--line);border-radius:9px;padding:3px;flex-wrap:wrap}
  .seg button{border:0;background:transparent;color:var(--muted);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:12px}
  .seg button.on{background:var(--flow,#38bdf8);color:#08111f;font-weight:600}
  .btn{border:1px solid var(--line);background:#0d1426;color:var(--ink);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12.5px}
  .btn:hover{border-color:var(--flow,#38bdf8)}
  select{background:#0d1426;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 8px}
  .wrap{display:flex;gap:12px;align-items:stretch}
  .stage{flex:1;min-width:0;background:linear-gradient(180deg,#0c1322,#0b1020);border:1px solid var(--line);border-radius:14px;padding:6px}
  svg{width:100%;height:auto;display:block}
  #drill{flex:0 0 408px;width:408px;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:auto;max-height:792px}
  @media(max-width:1080px){.wrap{flex-direction:column}#drill{flex:1 1 auto;width:100%;max-height:460px}}
  .node rect.bx{fill:#0c1322;stroke:var(--faint);stroke-width:1.5;cursor:pointer;transition:stroke .2s,fill .2s}
  .node .t{fill:var(--ink);font-size:13px;font-weight:600;pointer-events:none}
  .node .s{fill:var(--muted);font-size:10.5px;pointer-events:none}
  .node.on rect.bx{stroke:var(--flow);stroke-width:2.6;fill:#10203a}
  .node.dim{opacity:.4}
  .glyph{stroke:var(--muted);stroke-width:1.6;fill:none;pointer-events:none}
  .node.on .glyph{stroke:var(--flow)}
  .edge{fill:none;stroke:var(--faint);stroke-width:1.5;transition:stroke .15s,stroke-width .15s}
  .edge.on{stroke:var(--flow);stroke-width:3}
  #inspector{pointer-events:none}
  .insp{fill:rgba(12,19,34,.72);stroke:var(--flow,#38bdf8);stroke-opacity:.45;stroke-width:1.5}
  .insptt{fill:var(--flow,#38bdf8);font-size:12px;font-weight:700;letter-spacing:.4px}
  .inspsub{fill:var(--muted);font-size:10.5px}
  .inspedge{stroke:#46597a;stroke-width:1.5}
  .insparrow{fill:#6982a6}
  .inspchip{fill:#0c1322;stroke:var(--flow,#38bdf8);stroke-opacity:.5;stroke-width:1.3}
  .inspct{fill:#cbd5e1;font-size:11px}
  .inspconn{fill:none;stroke:var(--flow,#38bdf8);stroke-opacity:.3;stroke-width:1.5;stroke-dasharray:5 5}
  #narr{display:flex;align-items:flex-start;gap:12px;margin-top:10px;background:var(--panel);
    border:1px solid var(--line);border-left:4px solid var(--flow,#38bdf8);border-radius:10px;padding:11px 14px;min-height:54px}
  #step{flex:0 0 auto;font-variant-numeric:tabular-nums;color:var(--flow,#38bdf8);font-weight:700;font-size:13px}
  #desc{flex:1}
  #desc b{color:var(--flow,#38bdf8);font-weight:600}
  .dh{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 14px;z-index:2}
  .dh .lab{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--flow,#38bdf8);font-weight:700}
  .dh .ttl{font-size:15px;font-weight:650;margin-top:2px}
  .dh .role{color:var(--muted);font-size:12px;margin-top:4px}
  .db{padding:8px 12px 36px}
  .mod{border:1px solid var(--line);border-radius:9px;margin:8px 0;overflow:hidden}
  .mod>.f{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 9px;background:#0d1628;
    font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#9fb4d6}
  .mod>.f .tag{font-family:inherit;font-size:9px;text-transform:uppercase;color:#0b1020;background:#64748b;border-radius:4px;padding:1px 5px}
  .mod>.f .tag.fe{background:#2dd4bf}.mod>.f .tag.miss{background:#f43f5e}
  .mb{padding:6px 9px}
  .key{margin:0 0 6px}
  .key .kt{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#fbbf24;font-weight:700;margin-bottom:3px}
  .kn{font-weight:600;font-size:12px;margin:6px 0 3px;color:#cbd5e1}
  .kn::before{content:"▸ ";color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:4px}
  .m{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;background:#0b1322;border:1px solid #1d2840;
    border-radius:5px;padding:2px 6px;color:#cbd5e1}
  .m.k{border-color:#fbbf24;color:#fde68a;background:#1c1705}
  .more{color:var(--muted);font-size:10.5px;align-self:center}
  .note{color:var(--muted);font-style:italic;font-size:11px;padding:2px 0}
  .hintp{color:var(--muted);font-size:12px;padding:10px 2px}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Algo Trading Hub <small>system flow + live code drill-down</small></h1>
    <div class="spacer"></div>
    <div class="seg" id="flows"></div>
  </header>

  <div class="wrap">
    <div class="stage">
      <svg id="flow" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="#3b4d68"/>
          </marker>
          <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="#5b7196"/>
          </marker>
        </defs>
        <g id="edges"></g>
        <g id="nodes"></g>
        <g id="inspector"></g>
        <circle id="token" r="7" fill="#38bdf8" stroke="#0b1020" stroke-width="2" opacity="0"/>
        <circle id="orbit" r="5" fill="#38bdf8" stroke="#0b1020" stroke-width="1.5" opacity="0"/>
      </svg>
    </div>
    <aside id="drill">
      <div class="dh"><div class="lab">code drill-down</div><div class="ttl">—</div><div class="role"></div></div>
      <div class="db" id="dbody"><div class="hintp">Play a flow or click any box to see the real classes &amp; methods behind that stage.</div></div>
    </aside>
  </div>

  <div id="narr"><div id="step">—</div><div id="desc">Pick a flow and press play. Each box = a system module; the panel shows the code that runs there.</div></div>

  <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
    <button class="btn" id="play">▶ Play</button>
    <button class="btn" id="stepb">⏭ Step</button>
    <button class="btn" id="restart">↺ Restart</button>
    <label style="color:var(--muted)">Speed
      <select id="speed"><option value="1.6">0.5×</option><option value="1" selected>1×</option><option value="0.55">2×</option></select>
    </label>
    <div class="spacer"></div>
    <div style="color:var(--muted);font-size:12px">tip: click a box to pin its code</div>
  </div>
</div>

function pointAt(p,t){let d=t*edgeLen(p);
  for(let i=1;i<p.length;i++){const s=Math.hypot(p[i][0]-p[i-1][0],p[i][1]-p[i-1][1]);

  // step chips
  steps.forEach((s,i)=>{const P=pts[i], w=Math.max(64,s.length*6.6+16), h=24;
    inspG.appendChild(el("rect",{x:P[0]-w/2,y:P[1]-h/2,width:w,height:h,rx:7,class:"inspchip"}));
    const tx=el("text",{x:P[0],y:P[1]+4,"text-anchor":"middle",class:"inspct"}); tx.textContent=`${i+1}. ${s}`; inspG.appendChild(tx);
  });
  orbitState={pts};
}
(function orbitLoop(){ if(orbitState&&orbitState.pts){const P=orbitState.pts,nn=P.length; orbAng=(orbAng+0.02)%nn;
    const i=Math.floor(orbAng), r=orbAng-i, A=P[i], B=P[(i+1)%nn];
    orbit.setAttribute("cx",A[0]+(B[0]-A[0])*r); orbit.setAttribute("cy",A[1]+(B[1]-A[1])*r); orbit.setAttribute("opacity",1);}
  else orbit.setAttribute("opacity",0); requestAnimationFrame(orbitLoop); })();

function setFlow(k){
  flowKey=k; idx=0; stop(); clearActive();
  const f=FLOWS[k];
  document.documentElement.style.setProperty("--flow",f.color);
  token.setAttribute("fill",f.color); orbit.setAttribute("fill",f.color);
  document.querySelectorAll("#flows button").forEach(b=>b.classList.toggle("on",b.dataset.k===k));
  stepEl.textContent="—"; descEl.innerHTML=`<b>${f.label}.</b> Press play to watch it move, or step through.`;
}
function clearActive(){
  for(const id in edgeEls)edgeEls[id].classList.remove("on");
  for(const id in nodeEls){nodeEls[id].classList.remove("on");nodeEls[id].classList.remove("dim");}
  token.setAttribute("opacity",0); clearInside();
}
function selectNode(id){
  for(const e in edgeEls)edgeEls[e].classList.remove("on");
  for(const nid in nodeEls){nodeEls[nid].classList.toggle("on",nid===id);nodeEls[nid].classList.toggle("dim",nid!==id);}
  token.setAttribute("opacity",0); renderDrill(id); renderInside(id);
}
function highlight(eid){
  const used=new Set([E[eid].a,E[eid].b]);
  for(const id in nodeEls){nodeEls[id].classList.toggle("on",used.has(id));nodeEls[id].classList.toggle("dim",!used.has(id));}
  for(const id in edgeEls)edgeEls[id].classList.toggle("on",id===eid);
  renderDrill(E[eid].b); renderInside(E[eid].b);
}
function runStep(after){
  const f=FLOWS[flowKey]; if(idx>=f.steps.length)idx=0;
  const [eid,desc]=f.steps[idx];
  stepEl.textContent=`${idx+1}/${f.steps.length}`; descEl.innerHTML=desc; highlight(eid);
  const pts=E[eid].p, dur=1500*speed, t0=performance.now();
  token.setAttribute("opacity",1); cancelAnimationFrame(raf);
  (function frame(now){let p=(now-t0)/dur; if(p>1)p=1;
    const pt=pointAt(pts,p<0?0:p); token.setAttribute("cx",pt[0]); token.setAttribute("cy",pt[1]);
    if(p<1)raf=requestAnimationFrame(frame);
    else{token.setAttribute("opacity",0); idx++; if(after)after();}})(t0);
}
function loop(){ if(!playing)return; runStep(()=>{ if(playing) setTimeout(loop,520); }); }
function play(){ playing=true; document.getElementById("play").textContent="⏸ Pause"; loop(); }
function stop(){ playing=false; cancelAnimationFrame(raf); token.setAttribute("opacity",0);
  document.getElementById("play").textContent="▶ Play"; }

document.getElementById("play").onclick=()=>{ playing?stop():play(); };
document.getElementById("stepb").onclick=()=>{ stop(); runStep(); };
document.getElementById("restart").onclick=()=>{ stop(); idx=0; clearActive(); stepEl.textContent="—";
  descEl.innerHTML=`<b>${FLOWS[flowKey].label}.</b> Restarted — press play or step.`; };
document.getElementById("speed").onchange=e=>{ speed=parseFloat(e.target.value); };

const fb=document.getElementById("flows");
for(const k in FLOWS){const b=document.createElement("button");b.dataset.k=k;b.textContent=FLOWS[k].label;
  b.onclick=()=>{const wp=playing;setFlow(k);if(wp)play();};fb.appendChild(b);}

setFlow("trade"); play();
</script>
</body>
</html>
